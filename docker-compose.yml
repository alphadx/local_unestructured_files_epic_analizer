services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL – persistent job/document/audit store (Phase 2)
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-analyzer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-analyzer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Redis – Celery broker, result backend and pub/sub log streaming
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # ChromaDB – ephemeral vector store (data lost on `docker compose down -v`)
  # ─────────────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.0
    environment:
      - IS_PERSISTENT=FALSE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Backend – FastAPI engine
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash-lite}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
      - VECTOR_STORE_PROVIDER=${VECTOR_STORE_PROVIDER:-chroma}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - VECTOR_STORE_SSL=${VECTOR_STORE_SSL:-false}
      - VECTOR_STORE_HEADERS=${VECTOR_STORE_HEADERS:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - CORS_ORIGINS=${CORS_ORIGINS:-false}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-false}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-analyzer}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:8080"
    # Mount the target directory read-only so the container can analyse but
    # never delete or modify files without explicit user approval.
    volumes:
      - ${SCAN_PATH:-/tmp/fiasco_test}:/data/scan:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Worker – async pipeline execution (Phase 2)
  # ─────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash-lite}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
      - VECTOR_STORE_PROVIDER=${VECTOR_STORE_PROVIDER:-chroma}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - VECTOR_STORE_SSL=${VECTOR_STORE_SSL:-false}
      - VECTOR_STORE_HEADERS=${VECTOR_STORE_HEADERS:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-analyzer}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ${SCAN_PATH:-/tmp/fiasco_test}:/data/scan:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend – Next.js dashboard
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
